<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Connect4</title>
</head>
<body>
  <div class="app">
    <div class="card sidebar">
      <div>
        <h1>Connect 4 — 9×9</h1>
        <div class="sub">Sélectionne un mode puis clique sur une colonne pour lâcher un pion.</div>
      </div>

      <div>
        <label for="modeSelect">Mode de jeu</label>
        <select id="modeSelect">
          <option value="hvh">Humain vs Humain</option>
          <option value="random">Humain vs IA (aléatoire)</option>
          <option value="minimax">Humain vs IA (minimax)</option>
          <option value="bga">Humain vs IA (BGA / base de données)</option>
        </select>
      </div>

      <div>
        <button id="newGameBtn">Nouvelle partie</button>
      </div>

      <div class="status" id="status">
        <span class="pill"><span class="dot red"></span> ROUGE</span>
        <span class="sub">Clique “Nouvelle partie”.</span>
      </div>

      <div class="sub">
        Astuce : en mode IA, l’IA joue automatiquement en JAUNE.
      </div>
    </div>

    <div class="card boardWrap">
      <div class="boardTop" id="boardTop"></div>

      <div class="board">
        <div id="grid"></div>
      </div>

      <div class="sub" id="footerHint">Clic sur une colonne pour jouer.</div>
    </div>
  </div>
  
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/script.js" defer></script>
</body>
</html>
