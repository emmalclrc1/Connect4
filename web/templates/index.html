<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connect4 9×9</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: #121a2b;
      --board: #1a2a4a;
      --cell: #0f1730;
      --text: #e9eefc;
      --muted: #a9b4d0;
      --ring: rgba(255,255,255,.12);
      --shadow: rgba(0,0,0,.35);
      --red: #ff4d4d;
      --yellow: #ffd74a;
      --empty: #17213d;
      --hover: rgba(255,255,255,.10);
      --win: rgba(0, 255, 170, .25);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      background: radial-gradient(1200px 700px at 30% 20%, #15214a 0%, var(--bg) 55%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
      display:flex; align-items:center; justify-content:center;
      padding:24px;
    }
    .app{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:18px;
    }
    .card{
      background: rgba(18,26,43,.9);
      border: 1px solid rgba(255,255,255,.08);
      border-radius:16px;
      box-shadow: 0 18px 45px var(--shadow);
      overflow:hidden;
    }
    .sidebar{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    h1{
      font-size:20px;
      margin:0;
      letter-spacing:.2px;
    }
    .sub{
      color: var(--muted);
      font-size:13px;
      line-height:1.4;
    }
    label{
      font-size:12px;
      color: var(--muted);
      display:block;
      margin-bottom:6px;
    }
    select, button{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    button{
      cursor:pointer;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
    }
    button:hover{ background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08)); }
    button:active{ transform: translateY(1px); }
    .status{
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      min-height:46px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      font-size:12px;
      color: var(--muted);
    }
    .dot{
      width:10px; height:10px; border-radius:999px;
      background: var(--empty);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.25);
    }
    .dot.red{ background: var(--red); }
    .dot.yellow{ background: var(--yellow); }

    /* Board side */
    .boardWrap{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      justify-content:center;
    }
    .boardTop{
      width: min(620px, 100%);
      display:grid;
      grid-template-columns: repeat(9, 1fr);
      gap:10px;
    }
    .dropBtn{
      height:44px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor:pointer;
      font-weight:600;
    }
    .dropBtn:hover{ background: var(--hover); }
    .dropBtn:disabled{ opacity:.35; cursor:not-allowed; }

    .board{
      width: min(620px, 100%);
      aspect-ratio: 1 / 1;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:14px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
    }
    #grid{
      width:100%;
      height:100%;
      display:grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap:10px;
    }
    .cell{
      background: rgba(0,0,0,.20);
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .piece{
      width:100%;
      height:100%;
      border-radius:999px;
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.25), 0 8px 14px rgba(0,0,0,.25);
      background: var(--empty);
    }
    .piece.red{ background: var(--red); }
    .piece.yellow{ background: var(--yellow); }

    .hintCol{
      outline: 2px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
    }

    @media (max-width: 900px){
      .app{ grid-template-columns: 1fr; }
    }
    .cell.win {
      outline: 3px solid rgba(0, 255, 170, .55);
      box-shadow: 0 0 0 4px rgba(0, 255, 170, .18) inset;
    }
    .cell.win .piece {
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.25), 0 10px 18px rgba(0,0,0,.35);
      filter: brightness(1.08);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card sidebar">
      <div>
        <h1>Connect 4 — 9×9</h1>
        <div class="sub">Sélectionne un mode puis clique sur une colonne pour lâcher un pion.</div>
      </div>

      <div>
        <label for="modeSelect">Mode de jeu</label>
        <select id="modeSelect">
          <option value="hvh">Humain vs Humain</option>
          <option value="random">Humain vs IA (aléatoire)</option>
          <option value="minimax">Humain vs IA (minimax)</option>
          <option value="bga">Humain vs IA (BGA / base de données)</option>
        </select>
      </div>

      <div>
        <button id="newGameBtn">Nouvelle partie</button>
      </div>

      <div class="status" id="status">
        <span class="pill"><span class="dot red"></span> ROUGE</span>
        <span class="sub">Clique “Nouvelle partie”.</span>
      </div>

      <div class="sub">
        Astuce : en mode IA, l’IA joue automatiquement en JAUNE.
      </div>
    </div>

    <div class="card boardWrap">
      <div class="boardTop" id="boardTop"></div>

      <div class="board">
        <div id="grid"></div>
      </div>

      <div class="sub" id="footerHint">Clic sur une colonne pour jouer.</div>
    </div>
  </div>
  
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/script.js" defer></script>
</body>
</html>
