<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Connect4 — Jouer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">CONNECT <span class="brand4">4</span></div>
  <nav class="tabs">
    <a class="tab active" href="/play">Jouer</a>
    <a class="tab" href="/history">Historique</a>
    <a class="tab" href="/bga">BGA</a>
    <a class="tab" href="/about">Soutenance</a>
  </nav>
</header>

<main class="page">
  <section class="card">
    <div class="row">
      <div>
        <h1>Jouer</h1>
        <div class="muted">Vs IA en Rouge ou Jaune + prédiction + meilleur coup conseillé</div>
      </div>
      <button id="newGameBtn" class="btn">Nouvelle partie</button>
    </div>

    <div class="modes">
      <button class="modeBtn active" data-mode="pvp">PvP</button>
      <button class="modeBtn" data-mode="vsai">Vs IA</button>
      <button class="modeBtn" data-mode="iaia">IA/IA</button>
    </div>

    <div id="options" class="mt"></div>

    <div class="statsRow" id="globalStats">Stats...</div>
  </section>

  <section class="boardArea">
    <div class="boardTop" id="boardTop"></div>
    <div class="board"><div id="grid"></div></div>

    <section class="card">
      <div id="status" class="statusLine">—</div>
      <div class="muted">Séquence : <span id="seq">—</span></div>

      <div class="muted mt">
        Prédiction IA : <span id="pred">—</span>
      </div>

      <div class="muted mt">
        Conseil pour l'humain : <span id="hint">—</span>
      </div>
      <div id="hintDetails" class="weights"></div>

      <details class="debug">
        <summary>Analyse situation (pour l’image du prof)</summary>
        <div class="muted">Colle la séquence (ex: 3,3,4,2) puis “Analyser”.</div>
        <input id="seqInput" class="inp" placeholder="3,3,4,2" />
        <div class="row mt">
          <label class="muted">Profondeur
            <input id="anDepth" class="inpSmall" type="number" min="1" max="9" value="6" />
          </label>
          <button id="anBtn" class="btn">Analyser</button>
        </div>
        <div class="muted mt">Résultat : <span id="anRes">—</span></div>
        <div id="pv" class="weights"></div>
      </details>
    </section>
  </section>
</main>

<script src="/static/play.js" defer></script>
</body>
</html>
